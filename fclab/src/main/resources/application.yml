# application.yml
spring:
  profiles:
    include: secret
  datasource:
    url: jdbc:mysql://localhost:3306/fconline?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

nexon:
  api:
    base-url: "https://open.api.nexon.com/fconline/v1"

# swagger 설정
springdoc:
  swagger-ui:
    path: /swagger-ui.html # 접속 주소 설정
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: alpha # 알파벳 순 정렬

